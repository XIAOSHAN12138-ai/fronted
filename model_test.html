.btn-info { background: #3182ce; color: #fff; }

.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

#statusBar { text-align: center; padding: 10px; margin-bottom: 16px; border-radius: 8px; font-size: 14px; background: #1a1d26; }
#statusBar.running { background: #1a365d; color: #63b3ed; }
#statusBar.done { background: #22543d; color: #68d391; }
#statusBar.error { background: #742a2a; color: #feb2b2; }

.grid { display: grid; gap: 12px; max-width: 1500px; margin: 0 auto; }
.card { background: #1a1d26; border-radius: 10px; overflow: hidden; border: 1px solid #2d3342; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #23272f; border-bottom: 1px solid #2d3342; font-weight: 700; font-size: 15px; }
.card-header .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
.badge-pending { background: #4a5568; color: #cbd5e0; }
.badge-running { background: #2b6cb0; color: #bee3f8; }
.badge-pass { background: #276749; color: #c6f6d5; }
.badge-fail { background: #9b2c2c; color: #fed7d7; }
.badge-skip { background: #744210; color: #fefcbf; }

.test-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.test-table th { background: #23272f; padding: 8px 10px; text-align: left; font-weight: 600; color: #a0aec0; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; position: sticky; top: 0; }
.test-table td { padding: 7px 10px; border-top: 1px solid #2d3342; vertical-align: top; }
.test-table tr:hover td { background: #22262f; }
.test-table .model-name { font-weight: 600; white-space: nowrap; }
.test-table .feature-name { color: #90cdf4; }
.test-table .result-detail { font-size: 11px; color: #a0aec0; word-break: break-all; line-height: 1.5; }

.vendor-tag-a { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; background: #2c5282; color: #bee3f8; white-space: nowrap; }
.vendor-tag-b { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; background: #744210; color: #fefcbf; white-space: nowrap; }
.vendor-tag-unknown { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; background: #4a5568; color: #cbd5e0; white-space: nowrap; }

.progress-bar { height: 4px; background: #2d3748; border-radius: 2px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; background: #3182ce; transition: width .3s; }
.stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.stat-item { text-align: center; padding: 12px 20px; background: #1a1d26; border-radius: 8px; min-width: 90px; }
.stat-num { font-size: 26px; font-weight: 800; }
.stat-label { font-size: 12px; color: #888; margin-top: 2px; }
.log-area { max-width: 1500px; margin: 20px auto; background: #0d1117; border-radius: 8px; border: 1px solid #2d3342; overflow: hidden; }
.log-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #161b22; border-bottom: 1px solid #2d3342; font-size: 13px; font-weight: 600; }
.log-body { padding: 12px 16px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; line-height: 1.7; max-height: 400px; overflow-y: auto; white-space: pre-wrap; color: #c9d1d9; }
.log-info { color: #58a6ff; }
.log-ok { color: #3fb950; }
.log-warn { color: #d29922; }
.log-err { color: #f85149; }

.summary-panel { max-width: 1500px; margin: 0 auto 20px; background: #1a1d26; border-radius: 8px; border: 1px solid #2d3342; padding: 16px 20px; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.summary-item { background: #23272f; border-radius: 6px; padding: 12px 16px; }
.summary-item-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.summary-item-value { font-size: 22px; font-weight: 800; }
.summary-item-sub { font-size: 11px; color: #a0aec0; margin-top: 2px; }
</style>

function log(msg, type = 'info') {
    const el = document.getElementById('logBody');
    const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    const cls = type === 'ok' ? 'log-ok' : type === 'warn' ? 'log-warn' : type === 'err' ? 'log-err' : 'log-info';
    el.innerHTML += `<span class="${cls}">[${time}] ${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
}

function clearLog() { document.getElementById('logBody').innerHTML = ''; }

function getVendorTag(vendor) {
    if (vendor === 'vendor_a') return '<span class="vendor-tag-a">腾讯云</span>';
    if (vendor === 'vendor_b') return '<span class="vendor-tag-b">TS</span>';
    return '<span class="vendor-tag-unknown">' + (vendor || '?') + '</span>';
}

function updateStats() {
    const total = testResults.length;
    const pass = testResults.filter(r => r.status === 'pass').length;
    const fail = testResults.filter(r => r.status === 'fail').length;
    const skip = testResults.filter(r => r.status === 'skip').length;
    const running = testResults.filter(r => r.status === 'running').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPass').textContent = pass;
    document.getElementById('statFail').textContent = fail;
    document.getElementById('statSkip').textContent = skip;
    document.getElementById('statRunning').textContent = running;

    const done = pass + fail + skip;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
}

function setStatus(msg, cls) {

function renderRow(idx, model, feature, result) {
    let badgeCls = 'badge-pending', badgeText = '⏳ 待测';
    if (result) {
        if (result.status === 'running') { badgeCls = 'badge-running'; badgeText = '🔄 测试中'; }
        else if (result.status === 'pass') { badgeCls = 'badge-pass'; badgeText = '✅ 通过'; }
        else if (result.status === 'fail') { badgeCls = 'badge-fail'; badgeText = '❌ 失败'; }
        else if (result.status === 'skip') { badgeCls = 'badge-skip'; badgeText = '⏭️ 跳过'; }
    }
    return `<tr id="row-${idx}">
        <td>${idx + 1}</td>
        <td>${getVendorTag(model.vendor)}</td>
        <td class="model-name">${model.name}</td>
        <td class="feature-name">${feature.name}</td>
        <td><span class="badge ${badgeCls}">${badgeText}</span></td>
        <td>${result?.duration ? result.duration + 'ms' : '-'}</td>
        <td class="result-detail">${result?.detail || ''}</td>
    </tr>`;
}

async function loadModelsFromAPI() {
    const btn = document.getElementById('btnLoadAPI');
    btn.disabled = true;
    btn.textContent = '⏳ 加载中...';
    log('🔄 正在从后端加载模型列表...', 'info');

    try {
        const resp = await fetch(`${API_BASE}/models`);
        const data = await resp.json();

        if (data.code !== 200 || !data.data) {
            throw new Error(data.message || '返回数据异常');
        }

        apiSummary = data.data.summary || null;

        const apiImgModels = (data.data.image_models || []).map(m => ({
            id: m.id,
            name: m.name,
            vendor: m.vendor || '',
            vendor_name: m.vendor_name || ''
        }));

        const apiVidModels = (data.data.video_models || []).map(m => ({
            id: m.id,
            name: m.name,
            vendor: m.vendor || '',
            vendor_name: m.vendor_name || ''
        }));

        log(`✅ 从后端加载成功: 图片=${apiImgModels.length}, 视频=${apiVidModels.length}`, 'ok');

        if (apiSummary) {
            log(`📊 统计: 图片=${apiSummary.total_image_models}, 视频=${apiSummary.total_video_models}, 音色=${apiSummary.total_voices}`, 'info');
        }

        if (apiImgModels.length > 0) {
            IMAGE_MODELS.length = 0;
            IMAGE_MODELS.push(...apiImgModels);
        }
        if (apiVidModels.length > 0) {
            VIDEO_MODELS.length = 0;
            VIDEO_MODELS.push(...apiVidModels);
        }

        renderSummaryPanel();
        renderGrid();
        updateStats();

        log(`📋 当前用例数: 图片 ${IMAGE_MODELS.length}×${IMAGE_FEATURES.length}=${IMAGE_MODELS.length*IMAGE_FEATURES.length}, 视频 ${VIDEO_MODELS.length}×${VIDEO_FEATURES.length}=${VIDEO_MODELS.length*VIDEO_FEATURES.length}`, 'info');
        btn.textContent = '✅ 已从后端加载';

    } catch (err) {
        log(`❌ 加载失败: ${err.message}`, 'err');
        btn.textContent = '🔄 从后端加载模型（失败）';
    }
    btn.disabled = false;
}

async function runSingleTest(idx, sceneType, model, feature) {
    const rowId = `row-${idx}`;
    const rowEl = document.getElementById(rowId);
    if (!rowEl) return null;

    const result = {
        idx,
        sceneType,
        model: model.name,
        vendor: model.vendor || '',
        vendor_name: model.vendor_name || '',
        feature: feature.name,
        status: 'running',
        startTime: Date.now()
    };
    testResults[idx] = result;
    updateStats();

    rowEl.innerHTML = renderRow(idx, model, feature, result);
    log(`[测试 ${idx + 1}] ${sceneType === 'image' ? '📷' : '🎬'} [${model.vendor_name || model.vendor || '?'}] ${model.name} × ${feature.name} ...`, 'info');

    try {
        const body = buildRequestBody(sceneType, model.id, feature, model.vendor);
        const startTs = Date.now();
        const resp = await fetch(`${API_BASE}/generate?sync=true`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: abortController.signal,
        });
        const elapsed = Date.now() - startTs;
        const data = await resp.json();

        if (data.code === 200 && data.data) {
            const hasResult = data.data.result &&
                (Array.isArray(data.data.result.images) && data.data.result.images.length > 0 ||
                 data.data.result.video_url ||
                 (data.data.result.video && data.data.result.video.url));

            if (hasResult) {
                result.status = 'pass';
                result.detail = `code=200, 耗时=${elapsed}ms, task_id=${data.data.task_id}`;
                log(`[测试 ${idx + 1}] ✅ 通过 (${elapsed}ms) task_id=${data.data.task_id}`, 'ok');
            } else {
                result.status = 'fail';
                result.detail = `code=200 但 result 为空或无有效数据。data: ${JSON.stringify(data.data).substring(0, 300)}`;
                log(`[测试 ${idx + 1}] ❌ 失败: 返回成功但无结果数据`, 'err');
            }
        } else {
            result.status = 'fail';
            result.detail = `code=${data.code}, msg=${data.message}`;
            log(`[测试 ${idx + 1}] ❌ 失败: code=${data.code} msg=${data.message}`, 'err');
        }
        result.duration = elapsed;
    } catch (err) {
        if (err.name === 'AbortError') {
            result.status = 'skip';
            result.detail = '用户停止';
            log(`[测试 ${idx + 1}] ⏭️ 已跳过（停止）`, 'warn');
        } else {
            result.status = 'fail';
            result.detail = err.message.substring(0, 300);
            log(`[测试 ${idx + 1}] ❌ 异常: ${err.message}`, 'err');
        }
        result.duration = Date.now() - result.startTime;
    }

    testResults[idx] = result;
    updateStats();
    rowEl.innerHTML = renderRow(idx, model, feature, result);

    await sleep(300);
    return result;
}

function buildRequestBody(sceneType, modelId, feature, vendor) {
    if (sceneType === 'image') {
        return {
            output_type: 'image',
            model: modelId,
            vendor: vendor || undefined,
            feature: feature.id,
            parameters: { resolution: '1080P', ratio: '1:1', count: 1 },
            prompt: feature.prompt || TEST_PROMPTS.image,
            input_files: []
        };
    } else {
        const params = { resolution: '1080P', duration: 4, ratio: '16:9' };
        if (feature.id === 'lip_sync') {
            params.face_id = 0;
            params.audio_start_time = 0;
            params.audio_volume = 1.0;
            params.original_audio_volume = 0.0;
        }
        return {
            output_type: 'video',
            model: modelId,
            vendor: vendor || undefined,
            feature: feature.id,
            parameters: params,
            prompt: feature.prompt || TEST_PROMPTS.video,
            input_files: []
        };
    }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runTestSuite(suiteName, models, features, sceneType, bodyId, badgeId) {
    const totalCases = models.length * features.length;
    log(`\n${'='.repeat(60)}`);
    log(`🚀 开始测试 [${suiteName}] — ${models.length} 个模型 × ${features.length} 个功能 = ${totalCases} 个用例`);

    const vendors = [...new Set(models.map(m => m.vendor).filter(Boolean))];
    if (vendors.length > 0) {
        log(`   厂商分布: ${vendors.map(v => {
            const count = models.filter(m => m.vendor === v).length;
            const name = models.find(m => m.vendor === v)?.vendor_name || v;
            return `${name}(${count})`;
        }).join(', ')}`);
    }
    log(`${'='.repeat(60)}\n`);

    const body = document.getElementById(bodyId);
    body.innerHTML = '';
    let idxOffset = testResults.length;

    for (let mi = 0; mi < models.length; mi++) {
        for (let fi = 0; fi < features.length; fi++) {
            if (shouldStop) break;
            const idx = idxOffset + mi * features.length + fi;
            body.innerHTML += renderRow(idx, models[mi], features[fi], null);
        }
    }

    let passCount = 0, failCount = 0, skipCount = 0;
    const badge = document.getElementById(badgeId);

    for (let mi = 0; mi < models.length; mi++) {
        for (let fi = 0; fi < features.length; fi++) {
            if (shouldStop) break;
            const idx = idxOffset + mi * features.length + fi;
            const result = await runSingleTest(idx, sceneType, models[mi], features[fi]);
            if (result) {
                if (result.status === 'pass') passCount++;
                else if (result.status === 'fail') failCount++;
                else skipCount++;
            }
        }
    }

    badge.className = failCount > 0 ? 'badge-fail' : passCount > 0 ? 'badge-pass' : 'badge-skip';
    badge.textContent = `通过${passCount}/失败${failCount}/跳过${skipCount}`;

    log(`\n${'─'.repeat(40)}`);
    log(`📊 [${suiteName}] 完成: ✅${passCount} ❌${failCount} ⏭️${skipCount}\n`);
    return { pass: passCount, fail: failCount, skip: skipCount };
}

async function runAllTests() {
    shouldStop = false;
    abortController = new AbortController();
    setButtons(true);
    testResults = [];
    renderGrid();
    updateStats();
    setStatus('正在运行全部测试...', 'running');

    await runTestSuite('图片生成组', IMAGE_MODELS, IMAGE_FEATURES, 'image', 'imgBody', 'imgBadge');
    if (!shouldStop) {
        await runTestSuite('视频生成组', VIDEO_MODELS, VIDEO_FEATURES, 'video', 'vidBody', 'vidBadge');
    }

    setButtons(false);
    const totalFail = testResults.filter(r => r.status === 'fail').length;
    setStatus(totalFail > 0 ? `测试完成，${totalFail} 个失败` : `全部完成！`, totalFail > 0 ? 'error' : 'done');
    document.getElementById('btnExport').disabled = false;
}

async function runImageTests() {
    shouldStop = false;
    abortController = new AbortController();
    setButtons(true);
    testResults = [];
    renderGrid();
    updateStats();
    setStatus('正在测试图片生成组...', 'running');
    await runTestSuite('图片生成组', IMAGE_MODELS, IMAGE_FEATURES, 'image', 'imgBody', 'imgBadge');
    setButtons(false);

    setStatus(totalFail > 0 ? `测试完成，${totalFail} 个失败` : `图片组测试完成！`, totalFail > 0 ? 'error' : 'done');

}

async function runVideoTests() {
    shouldStop = false;
    abortController = new AbortController();
    setButtons(true);
    testResults = [];
    renderGrid();
    updateStats();
    setStatus('正在测试视频生成组...', 'running');
    await runTestSuite('视频生成组', VIDEO_MODELS, VIDEO_FEATURES, 'video', 'vidBody', 'vidBadge');
    setButtons(false);
    const totalFail = testResults.filter(r => r.status === 'fail').length;
    setStatus(totalFail > 0 ? `测试完成，${totalFail} 个失败` : `视频组测试完成！`, totalFail > 0 ? 'error' : 'done');
    document.getElementById('btnExport').disabled = false;
}

function stopTests() {
    shouldStop = true;
    if (abortController) abortController.abort();
    log('\n⏹ 用户请求停止测试\n', 'warn');
}

function exportReport() {
    const now = new Date().toLocaleString('zh-CN');
    const total = testResults.length;
    const pass = testResults.filter(r => r.status === 'pass').length;
    const fail = testResults.filter(r => r.status === 'fail').length;
    const skip = testResults.filter(r => r.status === 'skip').length;
    const rate = total > 0 ? ((pass / total) * 100).toFixed(1) : 0;

    let md = `# 模型功能测试报告\n\n`;
    md += `- **测试时间**: ${now}\n`;
    md += `- **API 地址**: ${API_BASE}\n`;
    md += `- **测试模式**: 同步模式 (\`?sync=true\`)\n`;

    if (apiSummary) {
        md += `\n## 🔗 后端统计信息\n\n`;
        md += `| 指标 | 数量 |\n|------|------|\n| 图片模型 | ${apiSummary.total_image_models} |\n| 视频模型 | ${apiSummary.total_video_models} |\n| 音色 | ${apiSummary.total_voices} |\n| 厂商 | ${(apiSummary.vendors || []).join(', ')} |\n\n`;
    }

    md += `## 📊 总体统计\n\n`;
    md += `| 指标 | 数量 |\n|------|------|\n| 总用例 | ${total} |\n| 通过 ✅ | ${pass} |\n| 失败 ❌ | ${fail} |\n| 跳过 ⏭️ | ${skip} |\n| 通过率 | ${rate}% |\n\n`;

    const imgResults = testResults.filter(r => r.sceneType === 'image');
    const vidResults = testResults.filter(r => r.sceneType === 'video');

    function renderSection(title, results) {
        md += `## ${title}\n\n`;
        md += `| # | 厂商 | 模型 | 功能 | 状态 | 耗时 | 详情 |\n|---|------|------|------|------|------|------|\n`;
        results.forEach((r, i) => {
            const icon = r.status === 'pass' ? '✅' : r.status === 'fail' ? '❌' : r.status === 'skip' ? '⏭️' : '⏳';
            const vName = r.vendor_name || r.vendor || '-';
            md += `| ${i + 1} | ${vName} | ${r.model} | ${r.feature} | ${icon} ${r.status} | ${r.duration || '-'}ms | ${(r.detail || '').replace(/\|/g, '\\|')} |\n`;
        });
        const p = results.filter(x => x.status === 'pass').length;
        const f = results.filter(x => x.status === 'fail').length;
        const byVendor = {};
        results.forEach(r => { const v = r.vendor || 'unknown'; byVendor[v] = (byVendor[v] || 0) + 1; });
        md += `\n> 小计: 通过 **${p}**, 失败 **${f}**, 共 **${results.length}**\n`;
        md += `> 厂商分布: ${Object.entries(byVendor).map(([v,c])=>`${v}: ${c}`).join(' | ')}\n\n`;
    }

    renderSection('📷 图片生成组测试详情', imgResults);
    renderSection('🎬 视频生成组测试详情', vidResults);

    const fails = testResults.filter(r => r.status === 'fail');
    if (fails.length > 0) {
        md += `## ❌ 失败用例汇总\n\n`;
        fails.forEach((r, i) => {
            md += `### ${i + 1}. [${r.vendor_name || r.vendor || '?'}] ${r.model} × ${r.feature}\n\n`;
            md += `- **场景**: ${r.sceneType === 'image' ? '图片' : '视频'}\n`;
            md += `- **错误**: \`${r.detail}\`\n\n`;
        });
    }

    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `模型测试报告_${new Date().toISOString().slice(0, 10)}.md`;
    a.click();
    URL.revokeObjectURL(url);
    log('📄 报告已导出', 'ok');
}

renderGrid();
updateStats();

log('就绪。点击按钮开始测试。', 'info');
log(`API: ${API_BASE}`, 'info');
log(`图片模型: ${IMAGE_MODELS.length} 个 × 功能: ${IMAGE_FEATURES.length} 个 = ${IMAGE_MODELS.length * IMAGE_FEATURES.length} 用例`, 'info');
log(`视频模型: ${VIDEO_MODELS.length} 个 × 功能: ${VIDEO_FEATURES.length} 个 = ${VIDEO_MODELS.length * VIDEO_FEATURES.length} 用例`, 'info');

const imgVendors = [...new Set(IMAGE_MODELS.map(m => m.vendor).filter(Boolean))];
const vidVendors = [...new Set(VIDEO_MODELS.map(m => m.vendor).filter(Boolean))];
if (imgVendors.length) log(`图片模型厂商: ${imgVendors.map(v => IMAGE_MODELS.find(m=>m.vendor===v)?.vendor_name||v).join(', ')}`, 'info');
if (vidVendors.length) log(`视频模型厂商: ${vidVendors.map(v => VIDEO_MODELS.find(m=>m.vendor===v)?.vendor_name||v).join(', ')}`, 'info');
log('\n💡 提示: 可点击「🔄 从后端加载模型」按钮获取最新模型列表和统计信息', 'info');
</script>
